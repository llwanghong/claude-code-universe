name: Check Upstream Updates

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check for upstream updates
        id: check
        run: |
          git submodule update --remote --init
          CHANGES=$(git diff --submodule upstream/)
          if [ -n "$CHANGES" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue on Update
        if: steps.check.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changes = `${{ steps.check.outputs.changes }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📚 Upstream submodules have updates',
              body: `Upstream repositories have new commits:\n\n\`\`\`\n${changes}\n\`\`\`\n\n- [ ] Update submodules\n- [ ] Check if translations need updating\n- [ ] Check if supplements need updating`,
              labels: ['upstream', 'documentation']
            });
